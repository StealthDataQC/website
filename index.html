<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petrarch — Coming 2026</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="description" content="Petrarch is coming in 2026. Discover the future.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Dashboard Design Tokens ── */
    :root {
      --bg:          #f8f5f0;
      --surface:     #f3efe9;
      --surface2:    #ede8e0;
      --white:       #ffffff;
      --border:      #ddd5cc;
      --border2:     #c8bdb0;
      --ink:         #1a1610;
      --ink2:        #6b5e52;
      --ink3:        #a89880;
      --accent:      #1e5631;
      --accent-dark: #0f2e1a;
      --accent-sub:  #f0f8f2;
      --accent-brd:  #c8e8d0;
      --red:         #c04040;
      --amber:       #c86020;
      --green-live:  #2d7a50;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: var(--bg);
    }

    body {
      font-family: 'Outfit', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      color: var(--ink);
    }

    /* ── interactive canvas backdrop ── */
    canvas#bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── soft radial glow following cursor ── */
    .glow {
      position: fixed;
      width: 50vmax;
      height: 50vmax;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30,86,49,0.06) 0%, transparent 55%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
      transition: top 0.25s ease-out, left 0.25s ease-out;
    }

    /* ── subtle texture overlay ── */
    .texture {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* ── content ── */
    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      animation: fade-up 2s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.3s;
    }

    .brand {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: clamp(3.2rem, 9vw, 5.5rem);
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin: 1.5rem auto;
      border-radius: 1px;
      opacity: 0;
      animation: fade-in 1s ease both;
      animation-delay: 1.6s;
    }

    .tagline {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(0.75rem, 1.4vw, 0.9rem);
      font-weight: 400;
      color: var(--ink3);
      margin-top: 0rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      animation: fade-in 1s ease both;
      animation-delay: 1.8s;
    }

    /* ── badge (matching dashboard "By Petrarch" style) ── */
    .badge-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 2.5rem;
      opacity: 0;
      animation: fade-in 1s ease both;
      animation-delay: 2.2s;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--ink3);
      background: var(--white);
    }

    .badge .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green-live);
      box-shadow: 0 0 0 2px rgba(45,122,80,0.18);
      animation: pulse-dot 2.5s ease-in-out infinite;
    }

    /* ── bottom nav hint ── */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      background: var(--white);
      border-top: 1px solid var(--border);
      box-shadow: 0 -1px 0 rgba(0,0,0,0.04);
      opacity: 0;
      animation: fade-in 0.8s ease both;
      animation-delay: 3s;
    }

    .bottom-bar span {
      font-size: 11px;
      color: var(--ink3);
      letter-spacing: 0.02em;
    }

    .bottom-bar a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .bottom-bar a:hover {
      color: var(--accent-dark);
    }

    /* ── brand icon (matching dashboard DD badge) ── */
    .brand-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: white;
      font-size: 13px;
      font-weight: 700;
      border-radius: 4px;
      margin: 0 auto 1.5rem;
      letter-spacing: -0.02em;
      opacity: 0;
      animation: fade-in 0.8s ease both;
      animation-delay: 0.8s;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); filter: blur(3px); }
      to   { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.6; transform: scale(1.2); }
    }

    /* ── scrollbar (match dashboard) ── */
    ::-webkit-scrollbar          { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track    { background: transparent; }
    ::-webkit-scrollbar-thumb    { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink3); }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="glow" id="cursor-glow"></div>
  <div class="texture"></div>

  <main class="container">
    <h1 class="brand">Petrarch</h1>
    <div class="divider"></div>
    <p class="tagline">coming 2026</p>

    <div class="badge-row">
      <span class="badge">
        <span class="dot"></span>
        Building
      </span>
    </div>
  </main>

  <div class="bottom-bar">
    <span>Petrarch &middot; Data infrastructure for the next era</span>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('bg');
      const ctx = canvas.getContext('2d');
      const glow = document.getElementById('cursor-glow');
      let W, H;
      let mouseX = -9999, mouseY = -9999;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);

      /* ── nodes ── */
      const NODE_COUNT = 60;
      const CONNECT_DIST = 130;
      const MOUSE_RADIUS = 200;
      const nodes = [];

      /* ── colors from dashboard theme ── */
      const nodeColor = [30, 86, 49];     /* --accent  #1e5631 */
      const lineColor = [200, 189, 176];  /* --border2 #c8bdb0 */

      function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function createNode() {
        return {
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.15,
          vy: (Math.random() - 0.5) * 0.15,
          r: Math.random() * 1.5 + 0.5,
          baseAlpha: Math.random() * 0.25 + 0.05,
        };
      }

      function init() {
        resize();
        nodes.length = 0;
        for (let i = 0; i < NODE_COUNT; i++) nodes.push(createNode());
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        for (let i = 0; i < nodes.length; i++) {
          const a = nodes[i];

          /* drift */
          a.x += a.vx;
          a.y += a.vy;

          /* wrap edges */
          if (a.x < -10) a.x = W + 10;
          if (a.x > W + 10) a.x = -10;
          if (a.y < -10) a.y = H + 10;
          if (a.y > H + 10) a.y = -10;

          /* subtle mouse attraction */
          const dmx = a.x - mouseX;
          const dmy = a.y - mouseY;
          const dm = Math.sqrt(dmx * dmx + dmy * dmy);
          if (dm < MOUSE_RADIUS && dm > 0) {
            const force = (1 - dm / MOUSE_RADIUS) * 0.015;
            a.x -= (dmx / dm) * force;
            a.y -= (dmy / dm) * force;
          }

          /* draw node — accent green */
          ctx.beginPath();
          ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${nodeColor[0]}, ${nodeColor[1]}, ${nodeColor[2]}, ${a.baseAlpha})`;
          ctx.fill();

          /* draw connections — warm border tone */
          for (let j = i + 1; j < nodes.length; j++) {
            const b = nodes[j];
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < CONNECT_DIST) {
              const alpha = (1 - dist / CONNECT_DIST) * 0.12;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.strokeStyle = `rgba(${lineColor[0]}, ${lineColor[1]}, ${lineColor[2]}, ${alpha})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }

        requestAnimationFrame(draw);
      }

      /* ── events ── */
      window.addEventListener('resize', () => { resize(); });
      window.addEventListener('mousemove', (e) => { 
        mouseX = e.clientX; 
        mouseY = e.clientY; 
        
        glow.style.left = mouseX + 'px';
        glow.style.top = mouseY + 'px';
        glow.style.transform = 'translate(-50%, -50%)';
      });
      
      window.addEventListener('touchmove', (e) => {
        if (e.touches.length) { 
          mouseX = e.touches[0].clientX; 
          mouseY = e.touches[0].clientY; 
          glow.style.left = mouseX + 'px';
          glow.style.top = mouseY + 'px';
        }
      }, { passive: true });
      
      window.addEventListener('mouseleave', () => { 
        mouseX = -9999; 
        mouseY = -9999; 
        glow.style.left = '50%';
        glow.style.top = '50%';
      });

      init();
      draw();
    })();
  </script>
</body>
</html>
